
seed: 3407
__set_seed: !apply:speechbrain.utils.seed_everything [!ref <seed>]
data_folder: !PLACEHOLDER  
output_folder: !ref <data_folder>/results
save_folder: !ref <output_folder>/save
train_log: !ref <output_folder>/train_log.txt
num_epochs: 50   
batch_size: 8   
learning_rate: 1e-4   
gradient_accumulation_steps: 6  
ctc_loss_weight: 0.3  

progress_samples: True
progress_sample_path: !ref <output_folder>/samples
progress_samples_interval: 1
progress_batch_sample_size: 4


sample_rate: 16000  
dataio_pipeline: !new:speechbrain.dataio.dataio.JSONDataIO
    json_train: !ref <data_folder>/train.json
    json_valid: !ref <data_folder>/dev.json
    json_test: !ref <data_folder>/test.json

speech_encoder: !new:speechbrain.lobes.models.huggingface_transformers.whisper.Whisper
    source: "openai/whisper-large-v3"
    freeze: True

model_path: "Llama-3.1-8B-Omni"

loss_ctc: !name:torch.nn.CTCLoss
    blank: 0
    reduction: "mean"

loss_ce: !name:torch.nn.CrossEntropyLoss
    label_smoothing: 0.2   


optimizer: !name:torch.optim.AdamW
    lr: !ref <learning_rate>
    betas: (0.9, 0.98)
    eps: 1e-8

scheduler: !new:speechbrain.nnet.schedulers.NoamScheduler
    lr_initial: !ref <learning_rate>
    n_warmup_steps: 5000

trainer: !new:speechbrain.trainers.Trainer
    model: !ref <model_path>
    optimizer: !ref <optimizer>
    scheduler: !ref <scheduler>
    data_pipeline: !ref <dataio_pipeline>
    batch_size: !ref <batch_size>
    num_epochs: !ref <num_epochs>
    gradient_accumulation_steps: !ref <gradient_accumulation_steps>

compute_loss: !new:speechbrain.utils.losses.compute_loss
    loss_fn:
        - !ref <loss_ce>
        - !ref <loss_ctc>
    loss_weights: [1.0, !ref <ctc_loss_weight>]

checkpointer: !new:speechbrain.utils.checkpoints.Checkpointer
    checkpoints_dir: !ref <save_folder>
    recoverables:
        model: !ref <model_path>
        optimizer: !ref <optimizer>
        scheduler: !ref <scheduler>

train_logger: !new:speechbrain.utils.train_logger.FileTrainLogger
    save_file: !ref <train_log>
